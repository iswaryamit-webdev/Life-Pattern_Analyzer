<!DOCTYPE html>
<html>
<head>
    <title>Productivity Score</title>

    <style>
        body{
            background-color:black;
            color:white;
            font-family:Arial;
            text-align:center;
            padding-top:50px;
        }

        h1{
            color:gold;
            font-size:50px;
        }

        .score-box{
            margin-top:40px;
            background:#111;
            width:400px;
            margin-left:auto;
            margin-right:auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px cyan;
        }

        .score{
            font-size:60px;
            color:aquamarine;
            font-weight:bold;
        }

        .status{
            font-size:25px;
            color:yellow;
            margin-top:20px;
        }

        a{
            display:inline-block;
            margin-top:30px;
            text-decoration:none;
            color:white;
            background:royalblue;
            padding:12px 25px;
            border-radius:10px;
        }

        a:hover{
            background:dodgerblue;
        }
    </style>

</head>

<body>

    <h1>🎯 Productivity Score</h1>

    <div class="score-box">

        <div class="score">
            {{ score }}
        </div>

        <div class="status">
            {{ status }}
        </div>

    </div>

    <a href="/dashboard">Back to Dashboard</a>

</body>
</html>
