<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body{
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            font-family:Arial,sans-serif;
        }

        .container{
            background:#111827;
            padding:40px;
            border-radius:20px;
            width:350px;
            text-align:center;
            box-shadow:0 0 25px rgba(0,255,255,0.3);
        }

        h1{
            color:#00e5ff;
            margin-bottom:30px;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:10px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:linear-gradient(45deg,#00c6ff,#0072ff);
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            transform:scale(1.03);
        }

        .nav-buttons{
            margin-top:20px;
            display:flex;
            flex-direction:column;
            gap:10px;
        }

        .nav-buttons a{
            text-decoration:none;
            color:white;
            background:#374151;
            padding:10px;
            border-radius:10px;
            transition:0.3s;
        }

        .nav-buttons a:hover{
            background:#00c6ff;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🔐 Login</h1>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="nav-buttons">
        <a href="/register">Create Account</a>
        <a href="/logout">Logout</a>
    </div>

</div>

</body>
</html>
