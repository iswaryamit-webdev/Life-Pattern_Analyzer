<!DOCTYPE html>
<html>
    <head>
        <title>
            AI Life Pattern Detector
        </title>
          <style>
            body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;

    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #0f172a
    );

    color:white;
}

.container{
    background:#111827;

    padding:40px;

    border-radius:20px;

    width:450px;

    text-align:center;

    box-shadow:0 0 30px rgba(0,255,255,0.3);
}

h1{
    color:#00e5ff;

    margin-bottom:25px;

    font-size:32px;

    text-shadow:0 0 10px #00e5ff;
}

input,
select{
    width:90%;

    padding:12px;

    margin:10px 0;

    border:none;

    border-radius:10px;

    font-size:16px;
}

button{
    width:95%;

    padding:12px;

    margin-top:15px;

    border:none;

    border-radius:10px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    color:white;

    background:linear-gradient(
        45deg,
        #00c6ff,
        #0072ff
    );
}

button:hover{
    transform:scale(1.03);
}
        </style>
        </head>
         <body>
        <h1>Welcome to AI LIFE PATTERN DETECTOR</h1>
        <form method="POST">
    <input type="date" name="log_date" required>

    <input type="number" step="1" name="sleep_hours" placeholder="Sleep Hours" required>

    <input type="number" step="1" name="study_hours" placeholder="Study Hours" required>

    <input type="number" step="0.1" name="exercise_hours" placeholder="Exercise Hours" required>

    <input type="number" step="1" name="screen_time" placeholder="Screen Time" required>

    <select name="mood_score">
        <option>Happy</option>
        <option>Normal</option>
        <option>Sad</option>
        <option>Stressed</option>
    </select>

    <button type="submit">Save Log</button>
</form>
   
    </body>
</html>
